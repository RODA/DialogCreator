name: build-linux-and-windows-intel

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-intel:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript output
        run: npm run build

      - name: Build Electron app (Linux intel)
        run: node scripts/build-linux.js --x64

      - name: Rename Linux artifacts
        run: npm run rename:linux

      - name: Write artifact checksums
        run: node scripts/write-artifact-checksums.js

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-intel-build
          path: |
            build/output/*_intel.AppImage
          if-no-files-found: error

  windows-intel:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript output
        run: npm run build

      - name: Build Electron app (Windows intel)
        run: npx electron-builder --win nsis portable --x64 --publish never

      - name: Rename Windows artifacts
        run: npm run rename:win

      - name: Write artifact checksums
        run: node scripts/write-artifact-checksums.js

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-intel-build
          path: |
            build/output/*_setup_*.exe
            build/output/*_intel.exe
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - linux-intel
      - windows-intel

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-intel-build
          path: release-assets/linux-intel

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-intel-build
          path: release-assets/windows-intel

      - name: Resolve release metadata
        id: release
        run: |
          echo "tag=latest" >> "$GITHUB_OUTPUT"
          echo "name=Latest build" >> "$GITHUB_OUTPUT"

      - name: Publish assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release.outputs.name }}
          generate_release_notes: false
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          overwrite_files: true
          append_body: false
          make_latest: false
          files: |
            release-assets/linux-intel/*
            release-assets/windows-intel/*
